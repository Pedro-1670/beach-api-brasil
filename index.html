<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beach API Brasil</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #1D9E75; --teal-light: #E1F5EE; --teal-dark: #085041;
    --coral: #D85A30; --coral-light: #FAECE7;
    --amber: #BA7517; --amber-light: #FAEEDA;
    --blue: #378ADD; --blue-light: #E6F1FB;
    --gray-100: #F1EFE8; --gray-500: #888780; --gray-900: #2C2C2A;
    --font-display: 'Syne', sans-serif;
    --font-body: 'Space Grotesk', sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: #f0f4f0;
    color: var(--gray-900);
    min-height: 100vh;
  }

  header {
    background: var(--teal-dark);
    color: #fff;
    padding: 2rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  header h1 {
    font-family: var(--font-display);
    font-size: 1.9rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  header p {
    font-size: 0.85rem;
    opacity: 0.75;
    margin-top: 4px;
  }

  .header-badge {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    color: #fff;
    text-decoration: none;
  }

  main { padding: 2rem 2.5rem; max-width: 1200px; margin: 0 auto; }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    padding: 10px 22px;
    border-radius: 999px;
    border: none;
    font-family: var(--font-body);
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary { background: var(--teal); color: #fff; }
  .btn-primary:hover { background: var(--teal-dark); }
  .btn-secondary { background: #fff; color: var(--gray-900); border: 1px solid #ddd; }
  .btn-secondary:hover { background: var(--gray-100); }

  .search-input {
    padding: 10px 16px;
    border-radius: 999px;
    border: 1px solid #ddd;
    font-family: var(--font-body);
    font-size: 0.88rem;
    background: #fff;
    outline: none;
    width: 220px;
  }

  .search-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(29,158,117,0.15); }

  .status-bar {
    font-size: 0.8rem;
    color: var(--gray-500);
    margin-left: auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.25rem;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 1.4rem;
    border: 1px solid #e8ede8;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }

  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.08); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
  }

  .beach-name {
    font-family: var(--font-display);
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.2;
  }

  .beach-state {
    font-size: 0.78rem;
    color: var(--gray-500);
    margin-top: 2px;
  }

  .condition-badge {
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .cond-Excelente { background: var(--teal-light); color: var(--teal-dark); }
  .cond-Boa { background: var(--blue-light); color: #185FA5; }
  .cond-Regular { background: var(--amber-light); color: #633806; }
  .cond-Ruim { background: var(--coral-light); color: #4A1B0C; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1rem;
  }

  .metric {
    background: var(--gray-100);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }

  .metric-icon { font-size: 1.1rem; }

  .metric-value {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gray-900);
    line-height: 1.2;
    margin-top: 2px;
  }

  .metric-label {
    font-size: 0.68rem;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .score-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--gray-100);
    border-radius: 999px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.8s ease;
  }

  .score-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--gray-500);
    min-width: 36px;
    text-align: right;
  }

  .loading {
    text-align: center;
    padding: 4rem;
    color: var(--gray-500);
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--gray-100);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    text-align: center;
    padding: 3rem;
    color: var(--coral);
    font-size: 0.9rem;
  }

  .ranking-view { display: none; }
  .ranking-view.active { display: block; }
  .grid-view.hidden { display: none; }

  .ranking-list { display: flex; flex-direction: column; gap: 10px; }

  .ranking-row {
    background: #fff;
    border-radius: 12px;
    padding: 1rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    border: 1px solid #e8ede8;
    transition: transform 0.2s;
  }

  .ranking-row:hover { transform: translateX(4px); }

  .rank-num {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 800;
    min-width: 36px;
    color: var(--teal);
  }

  .rank-num.top { color: var(--amber); }

  .rank-info { flex: 1; }
  .rank-info strong { font-size: 1rem; font-weight: 600; }
  .rank-info small { color: var(--gray-500); font-size: 0.8rem; display: block; }

  .rank-score {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--teal-dark);
    min-width: 52px;
    text-align: right;
  }

  .footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.78rem;
    color: var(--gray-500);
  }

  .footer a { color: var(--teal); text-decoration: none; }

  @media (max-width: 600px) {
    header, main { padding: 1.25rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🌊 Beach API Brasil</h1>
    <p>Condições em tempo real das principais praias</p>
  </div>
  <a class="header-badge" href="/docs" target="_blank">Ver documentação da API →</a>
</header>

<main>
  <div class="controls">
    <button class="btn btn-primary" id="btn-refresh" onclick="loadBeaches()">↻ Atualizar</button>
    <button class="btn btn-secondary" id="btn-ranking" onclick="toggleView()">🏆 Ver Ranking</button>
    <input class="search-input" type="text" id="search" placeholder="Filtrar praia..." oninput="filterCards()" />
    <span class="status-bar" id="status">Carregando...</span>
  </div>

  <div id="grid-view" class="grid-view">
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p>Buscando condições das praias...</p>
    </div>
    <div class="grid" id="card-grid"></div>
  </div>

  <div id="ranking-view" class="ranking-view">
    <div class="ranking-list" id="ranking-list"></div>
  </div>
</main>

<div class="footer">
  Dados via <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> · 
  <a href="/docs" target="_blank">Documentação da API</a> · 
  Atualizado automaticamente
</div>

<script>
  let allBeaches = [];
  let showingRanking = false;

  const scoreColor = score => {
    if (score >= 80) return '#1D9E75';
    if (score >= 60) return '#378ADD';
    if (score >= 40) return '#BA7517';
    return '#D85A30';
  };

  const windDir = deg => {
    const dirs = ['N','NE','L','SE','S','SO','O','NO'];
    return dirs[Math.round(deg / 45) % 8];
  };

  function renderCard(b) {
    return `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="beach-name">${b.beach_name}</div>
            <div class="beach-state">${b.city} · ${b.state}</div>
          </div>
          <span class="condition-badge cond-${b.condition}">${b.condition}</span>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-icon">🌡️</div>
            <div class="metric-value">${b.temperature.toFixed(1)}°</div>
            <div class="metric-label">Temp</div>
          </div>
          <div class="metric">
            <div class="metric-icon">🌬️</div>
            <div class="metric-value">${Math.round(b.wind_speed)}<span style="font-size:0.65rem">km/h</span></div>
            <div class="metric-label">Vento ${windDir(b.wind_direction)}</div>
          </div>
          <div class="metric">
            <div class="metric-icon">🌊</div>
            <div class="metric-value">${b.wave_height.toFixed(1)}<span style="font-size:0.65rem">m</span></div>
            <div class="metric-label">Ondas</div>
          </div>
        </div>
        <div class="score-bar-wrap">
          <div class="score-bar-bg">
            <div class="score-bar-fill" style="width:${b.score}%; background:${scoreColor(b.score)}"></div>
          </div>
          <span class="score-label">${b.score}/100</span>
        </div>
      </div>
    `;
  }

  function renderRanking(data) {
    const sorted = [...data].sort((a,b) => b.score - a.score);
    return sorted.map((b, i) => `
      <div class="ranking-row">
        <div class="rank-num ${i < 3 ? 'top' : ''}">#${i+1}</div>
        <div class="rank-info">
          <strong>${b.beach_name}</strong>
          <small>${b.city} · ${b.state} · ${b.condition}</small>
        </div>
        <div>
          <div class="score-bar-bg" style="width:100px">
            <div class="score-bar-fill" style="width:${b.score}%; background:${scoreColor(b.score)}"></div>
          </div>
        </div>
        <div class="rank-score" style="color:${scoreColor(b.score)}">${b.score}</div>
      </div>
    `).join('');
  }

  function filterCards() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = allBeaches.filter(b =>
      b.beach_name.toLowerCase().includes(q) || b.state.toLowerCase().includes(q)
    );
    document.getElementById('card-grid').innerHTML = filtered.map(renderCard).join('');
  }

  function toggleView() {
    showingRanking = !showingRanking;
    const btn = document.getElementById('btn-ranking');
    if (showingRanking) {
      document.getElementById('grid-view').classList.add('hidden');
      document.getElementById('ranking-view').classList.add('active');
      document.getElementById('ranking-list').innerHTML = renderRanking(allBeaches);
      btn.textContent = '🗺️ Ver Cards';
    } else {
      document.getElementById('grid-view').classList.remove('hidden');
      document.getElementById('ranking-view').classList.remove('active');
      btn.textContent = '🏆 Ver Ranking';
    }
  }

  async function loadBeaches() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('card-grid').innerHTML = '';
    document.getElementById('status').textContent = 'Atualizando...';

    try {
      const res = await fetch('/praias');
      if (!res.ok) throw new Error('Erro na API');
      const json = await res.json();
      allBeaches = json.data;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('card-grid').innerHTML = allBeaches.map(renderCard).join('');
      const now = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
      document.getElementById('status').textContent = `${allBeaches.length} praias · Atualizado às ${now}`;
      if (showingRanking) {
        document.getElementById('ranking-list').innerHTML = renderRanking(allBeaches);
      }
    } catch(e) {
      document.getElementById('loading').innerHTML = `
        <div class="error-msg">
          ⚠️ Não foi possível conectar à API.<br>
          <small>Certifique-se que o servidor está rodando em localhost:8000</small>
        </div>
      `;
      document.getElementById('status').textContent = 'Erro na conexão';
    }
  }

  loadBeaches();
</script>
</body>
</html>
